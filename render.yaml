services:
  # ===========================================
  # Backend (Spring Boot) - Render Web Service
  # ===========================================
  - type: web
    name: condocompare-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: POSTGRES_HOST
        fromDatabase:
          name: condocompare-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: condocompare-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: condocompare-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: condocompare-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: condocompare-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: condocompare-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: condocompare-redis
          type: redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: condocompare-docs
      - key: MINIO_REGION
        sync: false
      - key: IA_SERVICE_URL
        fromService:
          name: condocompare-ia
          type: web
          property: hostport
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        sync: false
      - key: RABBITMQ_PASSWORD
        sync: false

  # ===========================================
  # IA Service (FastAPI) - Render Web Service
  # ===========================================
  - type: web
    name: condocompare-ia
    runtime: docker
    dockerfilePath: ./ia-service/Dockerfile
    dockerContext: ./ia-service
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: POSTGRES_URL
        fromDatabase:
          name: condocompare-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: condocompare-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: condocompare-docs
      - key: BACKEND_URL
        fromService:
          name: condocompare-backend
          type: web
          property: hostport

  # ===========================================
  # Redis - Render Managed Redis
  # ===========================================
  - type: redis
    name: condocompare-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  # ===========================================
  # PostgreSQL - Render Managed (or use Supabase externally)
  # ===========================================
  - name: condocompare-db
    region: oregon
    plan: starter
    postgresMajorVersion: "16"

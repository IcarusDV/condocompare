version: '3.8'

services:
  # ===========================================
  # PostgreSQL + pgvector
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: condocompare-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-condocompare}
      POSTGRES_USER: ${POSTGRES_USER:-condocompare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-condocompare123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-condocompare}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condocompare-network

  # ===========================================
  # Redis (Cache)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: condocompare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condocompare-network

  # ===========================================
  # MinIO (S3 Compatible Storage)
  # ===========================================
  minio:
    image: minio/minio
    container_name: condocompare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - condocompare-network

  # ===========================================
  # RabbitMQ (Mensageria - futuro)
  # ===========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: condocompare-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-condocompare}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-condocompare123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - condocompare-network

  # ===========================================
  # Backend (Spring Boot)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: condocompare-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-condocompare}
      POSTGRES_USER: ${POSTGRES_USER:-condocompare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-condocompare123}
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-condocompare}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-condocompare123}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - condocompare-network

  # ===========================================
  # IA Service (FastAPI + Groq)
  # ===========================================
  ia-service:
    build:
      context: ./ia-service
      dockerfile: Dockerfile
    container_name: condocompare-ia
    env_file:
      - ./ia-service/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - condocompare-network

  # ===========================================
  # Frontend (Next.js) - Uncomment when ready
  # ===========================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: condocompare-frontend
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
  #     NEXT_PUBLIC_IA_URL: http://localhost:8000/api/v1
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #     - ia-service
  #   networks:
  #     - condocompare-network

networks:
  condocompare-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:

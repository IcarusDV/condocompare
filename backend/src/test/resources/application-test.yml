spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:16:///condocompare?TC_INITSCRIPT=
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none
  mail:
    host: localhost
    port: 2525

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1jb25kb2NvbXBhcmUtdGVzdHM=
  expiration: 86400000
  refresh-expiration: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: test-bucket
  region: us-east-1

ia-service:
  url: http://localhost:8000
  timeout: 5000

app:
  frontend-url: http://localhost:3000
  mail:
    from: test@condocompare.com
    name: CondoCompare Test

stripe:
  api-key:
  webhook-secret:

server:
  servlet:
    context-path: /api
